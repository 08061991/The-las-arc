name: Build Site from Private Notes

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout site repo
        uses: actions/checkout@v6
        with:
          path: site

      - name: Checkout private notes repo
        uses: actions/checkout@v6
        with:
          repository: 08061991/the-las-obs.note-private
          token: ${{ secrets.NOTES_TOKEN }}
          path: notes

      - name: Copy notes to content folder
        run: |
          rm -rf site/content/*
          cp -r notes/* site/content/
          echo "Content folder after copy:"
          ls -la site/content/

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: cd site && npm ci

      - name: Build Quartz
        run: cd site && npx quartz build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/public

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
        id: deployment
